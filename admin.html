<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">

    <style>
        body {

        body{
    margin:0;
    background:#111827;
    font-family:Arial;
    color:white;
}

.admin-box{
    width:500px;
    margin:50px auto;
    background:#1f2937;
    padding:30px;
    border-radius:20px;
}

.profile-card{
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    text-align:center;
    margin-bottom:25px;
}

.profile-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #facc15;
}

.profile-card input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#facc15;
    font-weight:bold;
    cursor:pointer;
}
    </style>
</head>
<body>

<div class="admin-box">
    <h1>Адмін панель AutoElite</h1>
    <p>Тут можна керувати авто, заявками та оплатами.</p>

    <button onclick="alert('Авто додано ✅')">Додати авто</button>
    <button onclick="alert('Заявки відкрито ✅')">Переглянути заявки</button>
    <button onclick="alert('Оплати перевірено ✅')">Перевірити оплати

    </button>
    <h2>Покупки</h2>
<div id="purchasesList"></div>
<button onclick="clearPurchases()">Очистити покупки</button>

<script>
function showPurchases() {
    let purchases = JSON.parse(localStorage.getItem("purchases")) || [];
    let list = document.getElementById("purchasesList");

    if (purchases.length === 0) {
        list.innerHTML = "<p>Покупок поки немає.</p>";
        return;
    }

    list.innerHTML = "";

    purchases.forEach(function(item, index) {
        list.innerHTML += `
            <div class="request-card">
                <strong>Покупка №${index + 1}</strong><br>
                Авто: ${item.car}<br>
                Ціна: ${item.price}<br>
                Дата: ${item.date}
            </div>
        `;
    });
}

function clearPurchases() {
    localStorage.removeItem("purchases");
    showPurchases();
}

showPurchases();
</script>
    <script>
        
function saveProfile() {
    let name = document.getElementById("nameInput").value;
    let photo = document.getElementById("photoInput").files[0];

    if (name) {
        document.getElementById("profileName").textContent = name;
        localStorage.setItem("profileName", name);
    }

    if (photo) {
        let reader = new FileReader();

        reader.onload = function(e) {
            document.getElementById("profilePhoto").src = e.target.result;
            localStorage.setItem("profilePhoto", e.target.result);
        }

        reader.readAsDataURL(photo);
    }

    alert("Профіль збережено ✅");
}

window.onload = function() {
    let savedName = localStorage.getItem("profileName");
    let savedPhoto = localStorage.getItem("profilePhoto");

    if (savedName) {
        document.getElementById("profileName").textContent = savedName;
    }

    if (savedPhoto) {
        document.getElementById("profilePhoto").src = savedPhoto;
    }
}
</script>
</div>

</body>
</html>
