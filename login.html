<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Вхід</title>

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111827;

    font-family:Arial;
}

.login-box{

    width:350px;

    background:#1f2937;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.login-box h2{

    color:white;

    margin-bottom:30px;
}

.login-box input{

    width:100%;

    padding:14px;

    margin-bottom:20px;

    border:none;

    border-radius:12px;

    background:#374151;

    color:white;

    font-size:16px;
}

.login-box button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#f0c36d;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;
}

.login-box a{

    color:#f0c36d;

    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Вхід в аккаунт</h2>

<input id="username"
type="text"
placeholder="Логін">

<input id="password"
type="password"
placeholder="Пароль">

<button onclick="login()">

Увійти

</button>

<br><br>

<a href="register.html">

Нема аккаунта? Реєстрація

</a>

</div>

<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let savedUser =
localStorage.getItem("username");

let savedPass =
localStorage.getItem("password");

if(username === savedUser &&
password === savedPass){

alert("Вхід успішний ✅");

window.location.href = "admin.html";

}else{

alert("Невірний логін або пароль ❌");

}

}

</script>

</body>
</html>
