<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone Store</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
    body{background:#0b0b0f;color:#fff;overflow-x:hidden;}

    header{
      position:sticky;top:0;
      background:rgba(10,10,15,0.85);
      backdrop-filter:blur(12px);
      display:flex;justify-content:space-between;align-items:center;
      padding:15px 20px;
      border-bottom:1px solid #222;
      z-index:10;
    }

    .logo{font-size:20px;font-weight:bold;}
    .logo span{color:#4da3ff;}

    nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

    nav button{
      background:none;border:none;color:#fff;
      cursor:pointer;font-size:14px;
      opacity:0.8;
    }

    nav button:hover{opacity:1;}

    input{
      padding:6px 10px;
      border-radius:8px;
      border:1px solid #333;
      background:#111;
      color:#fff;
    }

    .hero{
      height:85vh;
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      text-align:center;
      background: radial-gradient(circle at top,#1a1a2e,#0b0b0f);
      transform: translateZ(0);
    }

    .hero h1{font-size:55px;}
    .hero p{opacity:0.7;margin-top:10px;}

    .btn{
      margin-top:20px;
      padding:12px 25px;
      background:#4da3ff;
      border:none;
      border-radius:10px;
      cursor:pointer;
      color:#fff;
      transition:0.25s;
    }

    .btn:hover{transform:scale(1.05);}

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:50px;
    }

    .card{
      background:#151520;
      padding:20px;
      border-radius:15px;
      transition:0.3s;
      position:relative;
    }

    .card:hover{transform:translateY(-6px);}

    .card img{width:100%;border-radius:10px;}

    .price{color:#4da3ff;font-weight:bold;}

    .heart{
      position:absolute;
      top:10px;right:10px;
      cursor:pointer;
      font-size:18px;
      opacity:0.4;
      transition:0.2s;
    }

    .heart.active{opacity:1;color:red;}

    .cart{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#4da3ff;
      padding:15px 20px;
      border-radius:50px;
      cursor:pointer;
      z-index:20;
    }

    .cart-box{
      position:fixed;
      right:20px;
      bottom:80px;
      width:300px;
      background:#111;
      border:1px solid #333;
      padding:15px;
      border-radius:10px;
      display:none;
      z-index:20;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      margin:5px 0;
      font-size:14px;
    }

    .remove{
      cursor:pointer;
      color:#ff4d4d;
    }

    .toast{
      position:fixed;
      top:20px;
      right:20px;
      background:#4da3ff;
      padding:10px 15px;
      border-radius:8px;
      display:none;
    }

    .modal{
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modal-content{
      background:#111;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    .modal input{
      width:100%;margin:5px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">iPhone<span>Store</span></div>
  <nav>
    <input id="search" placeholder="Пошук..." oninput="filterProducts()" />
    <button>Головна</button>
    <button>Моделі</button>
  </nav>
</header>

<section class="hero">
  <h1>iPhone Store</h1>
  <p>Швидкий магазин Apple-стилю</p>
  <button class="btn" onclick="scrollToProducts()">Переглянути</button>
</section>

<section class="products" id="products"></section>

<div class="cart" onclick="toggleCart()">🛒</div>
<div class="cart-box" id="cartBox">
  <h4>Кошик</h4>
  <div id="cartList"></div>
  <button class="btn" onclick="openCheckout()">Оформити</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Оформлення</h3>
    <input placeholder="Ім'я" />
    <input placeholder="Телефон" />
    <button class="btn" onclick="finishOrder()">Підтвердити</button>
  </div>
</div>

<script>
const items = [
  {name:'iPhone 15 Pro',price:999},
  {name:'iPhone 15',price:799},
  {name:'iPhone 14 Pro',price:899}
];

let cart = JSON.parse(localStorage.getItem('cart')||'[]');
let favs = JSON.parse(localStorage.getItem('favs')||'[]');

function render(){
  const p = document.getElementById('products');
  p.innerHTML='';
  items.forEach(i=>{
    p.innerHTML+=`
    <div class='card' data-name='${i.name.toLowerCase()}'>
      <div class='heart ${favs.includes(i.name)?'active':''}' onclick='toggleFav("${i.name}",this)'>❤</div>
      <img src='https://via.placeholder.com/300x200'/>
      <h3>${i.name}</h3>
      <p class='price'>$${i.price}</p>
      <button class='btn' onclick='add("${i.name}")'>Купити</button>
    </div>`;
  });
}

function add(name){
  cart.push(name);
  localStorage.setItem('cart',JSON.stringify(cart));
  showToast('Додано в кошик');
  updateCart();
}

function updateCart(){
  const box=document.getElementById('cartList');
  box.innerHTML='';
  cart.forEach((c,i)=>{
    box.innerHTML+=`<div class='cart-item'>${c}<span class='remove' onclick='removeItem(${i})'>✖</span></div>`;
  });
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  updateCart();
}

function toggleCart(){
  const b=document.getElementById('cartBox');
  b.style.display=b.style.display==='block'?'none':'block';
}

function scrollToProducts(){
  document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

function toggleFav(name,el){
  if(favs.includes(name)) favs=favs.filter(f=>f!==name);
  else favs.push(name);
  localStorage.setItem('favs',JSON.stringify(favs));
  el.classList.toggle('active');
}

function filterProducts(){
  let v=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display=c.dataset.name.includes(v)?'block':'none';
  });
}

function showToast(t){
  let el=document.getElementById('toast');
  el.innerText=t;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1500);
}

function openCheckout(){
  document.getElementById('modal').style.display='flex';
}

function finishOrder(){
  cart=[];
  localStorage.removeItem('cart');
  updateCart();
  document.getElementById('modal').style.display='none';
  showToast('Замовлення оформлено');
}

render();
updateCart();
</script>

</body>
</html>
